name: Secure Deploy to VM1 (No Source Code on Server)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # deploy job에서 소문자 이미지 이름을 참조할 수 있도록 output 선언
    outputs:
      image_name: ${{ steps.image_name.outputs.value }}

    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 이미지 이름 소문자 변환
        id: image_name
        run: echo "value=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 3. GitHub Container Registry 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Backend Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-backend:${{ github.sha }}

      - name: 5. ETL Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.etl
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-etl:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-etl:${{ github.sha }}

      - name: 6. Consumer Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.consumer
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-consumer:latest
            ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}-consumer:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 7. 저장소 코드 가져오기 (infra 파일만)
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra
          fetch-depth: 1

      - name: 8. docker-compose 파일 및 설정 파일 복사
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.VM1_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          source: "infra/vm1-docker-compose.yml,infra/filebeat.yml"
          target: "~/"
          strip_components: 1

      - name: 9. VM1에 SSH로 접속하여 배포
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          KAFKA_BROKER: ${{ secrets.KAFKA_BROKER }}
          ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          VM2_IP: ${{ secrets.VM2_IP }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name }}-backend:latest
          ETL_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name }}-etl:latest
          CONSUMER_IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name }}-consumer:latest
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.VM1_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          envs: GHCR_TOKEN,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,KAFKA_BROKER,ELASTICSEARCH_URL,ALCHEMY_API_KEY,ALLOWED_ORIGINS,VM2_IP,BACKEND_IMAGE,ETL_IMAGE,CONSUMER_IMAGE
          script: |
            set -e

            # [1단계] GitHub Container Registry 로그인
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # [2단계] 최신 이미지 Pull (백엔드, ETL, Consumer)
            docker pull "$BACKEND_IMAGE"
            docker pull "$ETL_IMAGE"
            docker pull "$CONSUMER_IMAGE"

            # [3단계] filebeat 설정 파일을 docker-compose가 기대하는 경로로 배치
            mkdir -p ~/infra
            cp ~/filebeat.yml ~/infra/filebeat.yml

            # [4단계] .env 파일 임시 생성 → docker compose 실행 → 즉시 삭제 (보안 핵심)
            echo "POSTGRES_USER=$POSTGRES_USER" > .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "POSTGRES_DB=$POSTGRES_DB" >> .env
            echo "POSTGRES_DSN=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@timescaledb:5432/$POSTGRES_DB" >> .env
            echo "KAFKA_BROKER=$KAFKA_BROKER" >> .env
            echo "ELASTICSEARCH_URL=$ELASTICSEARCH_URL" >> .env
            echo "ALCHEMY_API_KEY=$ALCHEMY_API_KEY" >> .env
            echo "ALLOWED_ORIGINS=$ALLOWED_ORIGINS" >> .env
            echo "VM2_IP=$VM2_IP" >> .env

            BACKEND_IMAGE="$BACKEND_IMAGE" \
            ETL_IMAGE="$ETL_IMAGE" \
            CONSUMER_IMAGE="$CONSUMER_IMAGE" \
            docker compose -f vm1-docker-compose.yml up -d

            rm -f .env

            # [5단계] 컨테이너 정상 기동 확인
            echo "Waiting for containers to start..."
            sleep 10

            FAILED=0
            for CONTAINER in fastapi_backend kafka_consumer ethereum_etl timescaledb redis filebeat; do
              if docker ps --filter "name=$CONTAINER" --filter "status=running" | grep -q "$CONTAINER"; then
                echo "✅ $CONTAINER 정상 기동"
              else
                echo "❌ $CONTAINER 기동 실패"
                docker logs "$CONTAINER" 2>&1 | tail -20
                FAILED=1
              fi
            done

            [ "$FAILED" -eq 1 ] && exit 1
            echo "✅ 전체 배포 성공"

            # [6단계] 사용하지 않는 이미지 정리 (디스크 절약)
            docker image prune -f
