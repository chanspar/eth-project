name: Deploy to VM1 (Backend & DB)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'infra/vm1-docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 옵션: Docker Hub 또는 GCR에 이미지를 푸시하고 싶다면 여기에 로그인 스텝 추가
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.VM1_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          script: |
            cd ~/eth-proj-v2
            git pull origin main
            # 최신 docker-compose.yml을 기반으로 빌드 및 재실행
            docker-compose -f infra/vm1-docker-compose.yml up -d --build backend
