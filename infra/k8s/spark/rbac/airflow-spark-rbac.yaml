# =====================================================================
# airflow-spark-rbac.yaml
# Airflow -> Spark 교차 네임스페이스 RBAC 설정
# 목적: airflow 네임스페이스의 Worker가 spark 네임스페이스에 작업을 실행할 권한 부여
# =====================================================================

# 사용할 Kubernetes API 버전을 정의합니다. (RBAC은 v1 사용)
apiVersion: rbac.authorization.k8s.io/v1
# 생성할 오브젝트의 종류가 'Role(특정 네임스페이스 내 권한 정의)'임을 명시합니다.
kind: Role

metadata:
  # 이 역할(Role)의 이름을 지정합니다.
  name: airflow-spark-role
  # 이 권한이 적용될 대상 네임스페이스입니다. (Spark 작업이 실행될 공간)
  namespace: spark

rules:
  # [규칙 1] SparkApplication CRD(커스텀 리소스)를 제어할 수 있는 권한
  - apiGroups: ["sparkoperator.k8s.io"] # Spark 오퍼레이터가 정의한 API 그룹을 지정
    resources: ["sparkapplications", "sparkapplications/status"]  # 본체 + 상태 서브리소스
    # 허용할 행동들 (생성, 삭제, 조회, 목록조회, 변경 등)
    verbs: ["create", "delete", "get", "list", "watch", "patch"]

  # [규칙 2] Spark이 실행한 Driver/Executor Pod들의 상태와 로그를 확인할 수 있는 권한
  - apiGroups: [""]                     # Kubernetes 기본 코어(Core) API 그룹을 의미, (예: pods, services, namespaces, configmaps 등)
    resources: ["pods", "pods/log"]     # 제어할 대상 리소스 (Pod 자체 및 Pod의 로그)
    # 허용할 행동들 (상태 조회, 목록 조회, 실시간 모니터링, 메타데이터 수정(patch), 삭제)
    verbs: ["get", "list", "watch", "patch", "delete"]
---
# 사용할 Kubernetes API 버전을 정의합니다.
apiVersion: rbac.authorization.k8s.io/v1
# 생성할 오브젝트의 종류가 'RoleBinding(역할과 대상을 연결)'임을 명시합니다.
kind: RoleBinding

metadata:
  # 이 연결 설정(RoleBinding)의 이름을 지정합니다.
  name: airflow-spark-rolebinding
  # 중요! 권한을 행사할 '목적지' 네임스페이스입니다. (Role과 반드시 같은 네임스페이스여야 함)
  namespace: spark

subjects:
  # 권한을 부여받을 대상(주체)을 지정합니다.
  - kind: ServiceAccount
    # 권한을 가져갈 대상 서비스 어카운트의 이름입니다. (Airflow Worker 가 사용하는 SA)
    name: airflow-worker        # (주의: Airflow Helm 차트 설정에 따라 이름이 다를 수 있으니 확인 필요)
    # 중요! 권한을 가져갈 대상이 존재하는 '출발지' 네임스페이스입니다.
    namespace: airflow
  - kind: ServiceAccount   # scheduler도 SparkApp을 생성할 수 있어야 한다.
    name: airflow-scheduler
    namespace: airflow

roleRef:
  # 어떤 역할(Role)을 연결해줄지 참조(Reference)합니다.
  kind: Role
  # 위에서 정의한 Role의 이름을 정확히 적어줍니다.
  name: airflow-spark-role
  # Role을 지원하는 기본 API 그룹을 지정합니다.
  apiGroup: rbac.authorization.k8s.io