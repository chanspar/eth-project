input {
  beats {
    port => 5044
  }
}

filter {
  # If the message is a raw JSON string, parse it
  if [message] =~ /^\{.*/ {
    json {
      source => "message"
      # remove the raw message field after successful parsing
      remove_field => ["message"]
    }
  }
  
  # Ensure the timestamp in the log becomes the official Elasticsearch @timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }
  # For debugging, also print to logstash console
  stdout { codec => rubydebug }
}
