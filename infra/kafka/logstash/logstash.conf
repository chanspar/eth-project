input {
  beats {
    port => 5044
  }
}

filter {
  # [Fallback] 현재는 Filebeat(filebeat.yml)의 json.keys_under_root: true 설정이
  # JSON 파싱을 이미 처리하므로 이 블록은 실행되지 않음.
  # Filebeat 설정 변경 또는 다른 수집기 도입 시 2차 안전망으로 동작.
  if [message] =~ /(?m)^\{.*\}/ {

    # JSON 안에 진짜 message 필드가 있을 수 있어서 원본을 raw_message로 먼저 피신
    mutate {
      rename => { "message" => "raw_message" }
    }

    # 피신한 raw_message를 JSON으로 파싱, 완료 후 raw_message 삭제
    json {
      source => "raw_message"
      tag_on_failure => ["_json_parse_failure"]  # 파싱 실패 시 태그로 표시
      remove_field => ["raw_message"]            # 파싱 완료 후 원본 문자열 제거
    }
  }

  # 로그의 timestamp를 Elasticsearch @timestamp로 동기화
  if [timestamp] {
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss,SSS", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => ["_date_parse_failure"]  # 파싱 실패 시 태그로 표시
      remove_field => ["timestamp"]              # 변환 후 원본 필드 제거 (중복 방지)
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "ethbackend"
    data_stream_namespace => "default"
  }

  # 개발 시에만 사용, 프로덕션 배포 전 아래 줄 삭제
  # stdout { codec => rubydebug }
}
