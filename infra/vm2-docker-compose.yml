version: '3.8'

services:
  # 1. Kafka (KRaft mode)
  kafka:
    image: bitnami/kafka:3.4.0
    container_name: kafka
    environment:
      # KRaft mode 설정
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://${VM2_IP:-127.0.0.1}:9094
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_HEAP_OPTS=-Xmx1024m -Xms1024m
    ports:
      - "9092:9092"
      - "9094:9094" # 외부(VM1) 통신용
    volumes:
      - kafka_data:/bitnami/kafka
    restart: always

  # 1-1. Kafka 토픽 자동 생성 (초기화 컨테이너)
  kafka-init:
    image: bitnami/kafka:3.4.0
    container_name: kafka_init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be ready..."
        until kafka-topics.sh --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Kafka is ready. Creating topics..."
        kafka-topics.sh --create --bootstrap-server kafka:9092 --topic blocks --partitions 3 --replication-factor 1 --if-not-exists
        kafka-topics.sh --create --bootstrap-server kafka:9092 --topic transactions --partitions 3 --replication-factor 1 --if-not-exists
        kafka-topics.sh --create --bootstrap-server kafka:9092 --topic token_transfers --partitions 3 --replication-factor 1 --if-not-exists
        echo "✅ All topics created successfully"
    restart: "no"

  # 2. Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # 개발/테스트용 (프로덕션 배포시 true로 변경 권장)
      - ES_JAVA_OPTS=-Xms2g -Xmx2g # 최소 2GB 힙 메모리
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  # 3. Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.2
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - ./infra/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044" # Filebeat에서 로그 받는 포트
    depends_on:
      - elasticsearch
    restart: always

  # 4. Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: always

volumes:
  kafka_data:
  es_data:
